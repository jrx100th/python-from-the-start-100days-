<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}JENIT — DOOM{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/doom.css') }}">
    {% block head %}{% endblock %}
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&amp;display=swap');
        
        :root {
            --doom-red: #9d2a1f;
            --doom-brown: #3f2a1f;
        }
        
        body {
            font-family: "VT323", "Courier New", monospace;
        }
        
        .doom-font {
            font-family: "VT323", "Courier New", monospace;
            letter-spacing: 1px;
        }

        .retro-border {
            border: 4px solid #5a4636;
            box-shadow: 0 0 0 4px #2a1f17,
                        inset 0 0 0 2px #8a6646;
        }

        .doom-text {
            text-shadow: 3px 3px 0 #000,
                        -1px -1px 0 #000,
                        1px -1px 0 #000,
                        -1px 1px 0 #000,
                        1px 1px 0 #000;
        }

        .crt {
            position: relative;
        }
        
        .crt::after {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: repeating-linear-gradient(
                transparent 0px,
                transparent 3px,
                rgba(0, 0, 0, 0.15) 3px,
                rgba(0, 0, 0, 0.15) 4px
            );
            pointer-events: none;
            z-index: 2;
        }
    </style>
</head>
<body class="bg-[#1a120b] text-[#c9b38a] doom-font">
    {% block content %}{% endblock %}
    
    <script>
        // Tailwind play config for retro look
        function initTailwind() {
            if (typeof tailwind !== 'undefined') {
                tailwind.config = {
                    theme: {
                        extend: {
                            fontFamily: {
                                'retro': ['VT323', 'Courier New', 'monospace']
                            }
                        }
                    }
                };
            }
        }
        document.addEventListener('DOMContentLoaded', initTailwind);
    </script>
    
    {% block scripts %}{% endblock %}
</body>
</html>
